# =============================================================================
# WTracker Docker Compose Configuration
# Development environment with FastAPI, PostgreSQL, and supporting services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      target: development
    container_name: wtracker-api
    ports:
      - "8001:8000"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./templates:/app/templates
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for async driver
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: wtracker-db
    ports:
      - "5434:5432"
    env_file:
      - .env
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wtracker} -d ${POSTGRES_DB:-wtracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database Admin (pgAdmin) - Optional, for development convenience
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wtracker-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@wtracker.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - wtracker-network
    profiles:
      - tools
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - Message broker for Celery background tasks
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wtracker-redis
    # No external port - internal Docker network only (avoids host port conflicts)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Worker - Processes background tasks (scraping, maintenance)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      target: development
    container_name: wtracker-worker
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2 -Q scraping,maintenance,celery
    networks:
      - wtracker-network
      - yarntrack_default  # Access to Tor proxy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Beat - Scheduler for periodic tasks
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      target: development
    container_name: wtracker-beat
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - worker
      - redis
    command: celery -A src.tasks.celery_app beat --loglevel=info
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Tor Proxy (for anti-bot detection)
  # ---------------------------------------------------------------------------
  tor:
    image: dperson/torproxy:latest
    container_name: wtracker-tor
    ports:
      - "9150:9050"  # SOCKS5 proxy (external:internal)
      - "9151:9051"  # Control port
    environment:
      - TOR_NewCircuitPeriod=60  # New circuit every 60 seconds
      - TOR_MaxCircuitDirtiness=600  # Max circuit age 10 minutes
    networks:
      - wtracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--socks5", "localhost:9050", "--head", "https://check.torproject.org"]
      interval: 60s
      timeout: 10s
      retries: 3

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  wtracker-network:
    driver: bridge
  yarntrack_default:
    external: true  # Tor proxy is on this network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
