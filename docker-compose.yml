# =============================================================================
# WTracker Docker Compose Configuration
# Development environment with FastAPI, PostgreSQL, and supporting services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      target: development
    container_name: wtracker-api
    ports:
      - "8001:8000"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./tests:/app/tests
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for async driver
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: wtracker-db
    ports:
      - "5434:5432"
    env_file:
      - .env
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wtracker} -d ${POSTGRES_DB:-wtracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wtracker-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database Admin (pgAdmin) - Optional, for development convenience
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wtracker-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@wtracker.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - wtracker-network
    profiles:
      - tools
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - For future caching and background jobs (optional for MVP)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: wtracker-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wtracker-network
    profiles:
      - full
    restart: unless-stopped

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  wtracker-network:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
