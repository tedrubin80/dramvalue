{% extends "base.html" %}

{% block title %}Reset Password - DramValue{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-16">
    <div class="dv-card rounded-xl p-8">
        <h1 class="heading-serif text-2xl dv-text mb-2">Choose a new password</h1>
        <p class="dv-text-muted text-sm mb-6">At least 8 characters.</p>

        <div id="success-msg" class="dv-notice-green mb-5 hidden">
            <p class="font-medium">Password updated</p>
            <p class="text-sm mt-1"><a href="/auth/login" class="underline">Log in</a> with your new password.</p>
        </div>

        <div id="error-msg" class="dv-notice-red mb-5 hidden">
            <p id="error-text" class="text-sm"></p>
        </div>

        <form id="reset-form" class="space-y-4">
            <input type="hidden" id="token" value="{{ token }}">
            <div>
                <label for="password" class="block text-sm dv-text-muted mb-1.5">New password</label>
                <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password"
                       class="dv-input w-full px-4 py-2.5 text-sm rounded-lg">
            </div>
            <div>
                <label for="confirm" class="block text-sm dv-text-muted mb-1.5">Confirm password</label>
                <input type="password" id="confirm" name="confirm" required minlength="8" autocomplete="new-password"
                       class="dv-input w-full px-4 py-2.5 text-sm rounded-lg">
            </div>
            <button type="submit" id="submit-btn"
                    class="w-full dv-accent-bg py-2.5 rounded-lg text-sm font-medium">
                Set New Password
            </button>
        </form>

        <p class="text-center text-sm dv-text-muted mt-6">
            <a href="/auth/forgot-password" class="dv-accent-text hover:underline">Request a new link</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('reset-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const token = document.getElementById('token').value;
    document.getElementById('error-msg').classList.add('hidden');

    if (password !== confirm) {
        document.getElementById('error-text').textContent = 'Passwords do not match.';
        document.getElementById('error-msg').classList.remove('hidden');
        return;
    }
    if (password.length < 8) {
        document.getElementById('error-text').textContent = 'Password must be at least 8 characters.';
        document.getElementById('error-msg').classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    try {
        const r = await fetch('/api/v1/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, new_password: password })
        });
        const data = await r.json();
        if (r.ok) {
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('success-msg').classList.remove('hidden');
        } else {
            document.getElementById('error-text').textContent = data.detail || 'Something went wrong.';
            document.getElementById('error-msg').classList.remove('hidden');
            btn.disabled = false;
            btn.textContent = 'Set New Password';
        }
    } catch (e) {
        document.getElementById('error-text').textContent = 'Network error. Please try again.';
        document.getElementById('error-msg').classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
    }
});
</script>
{% endblock %}
