{% extends "base.html" %}

{% block title %}Login - DramValue{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-7">
            <h1 class="heading-serif text-3xl dv-text mb-1">Welcome back</h1>
            <p class="dv-text-muted text-sm">Sign in to access your collections and price alerts</p>
        </div>

        <div class="dv-card rounded-xl p-8">
            <form x-data="{
                email: '',
                password: '',
                loading: false,
                errors: {},
                async submitForm() {
                    this.errors = {};
                    this.loading = true;
                    if (!this.email) this.errors.email = 'Email is required';
                    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.email)) this.errors.email = 'Enter a valid email';
                    if (!this.password) this.errors.password = 'Password is required';
                    if (Object.keys(this.errors).length > 0) { this.loading = false; return; }
                    try {
                        const r = await fetch('/api/v1/auth/login', {
                            method: 'POST',
                            credentials: 'include',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email: this.email, password: this.password })
                        });
                        const data = await r.json();
                        if (r.ok) {
                            const raw = new URLSearchParams(window.location.search).get('redirect') || '/';
                            const redirect = (raw.startsWith('/') && !raw.startsWith('//')) ? raw : '/';
                            window.location.href = redirect;
                        } else {
                            this.errors.general = r.status === 401 ? 'Invalid email or password'
                                : (data.detail || 'Something went wrong.');
                            this.loading = false;
                        }
                    } catch (e) { this.errors.general = 'Network error. Please try again.'; this.loading = false; }
                }
            }" @submit.prevent="submitForm()">

                <div x-show="errors.general" x-transition class="dv-notice-red mb-4">
                    <p class="text-sm" x-text="errors.general"></p>
                </div>

                <div class="mb-4">
                    <label for="email" class="block text-sm dv-text-muted mb-1.5">Email</label>
                    <input type="email" id="email" x-model="email"
                           class="dv-input w-full px-4 py-2.5 text-sm rounded-lg"
                           placeholder="you@example.com" autocomplete="email">
                    <p x-show="errors.email" x-text="errors.email" class="mt-1 text-xs" style="color: oklch(50% 0.15 25);"></p>
                </div>

                <div class="mb-5">
                    <label for="password" class="block text-sm dv-text-muted mb-1.5">Password</label>
                    <input type="password" id="password" x-model="password"
                           class="dv-input w-full px-4 py-2.5 text-sm rounded-lg"
                           placeholder="Enter your password" autocomplete="current-password">
                    <p x-show="errors.password" x-text="errors.password" class="mt-1 text-xs" style="color: oklch(50% 0.15 25);"></p>
                </div>

                <div class="flex justify-end mb-5">
                    <a href="/auth/forgot-password" class="text-xs dv-accent-text hover:underline">Forgot password?</a>
                </div>

                <button type="submit" :disabled="loading"
                        class="w-full dv-accent-bg py-2.5 rounded-lg text-sm font-medium flex items-center justify-center disabled:opacity-50">
                    <svg x-show="loading" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span x-text="loading ? 'Signing in...' : 'Sign In'"></span>
                </button>
            </form>

            <div class="mt-5 pt-5 border-t dv-divider text-center">
                <span class="text-sm dv-text-muted">New to DramValue? </span>
                <a href="/auth/register" class="text-sm dv-accent-text font-medium hover:underline">Create an account</a>
            </div>
        </div>

        <p class="mt-5 text-center text-xs dv-text-faint">
            By signing in, you agree to our
            <a href="/terms" class="dv-accent-text hover:underline">Terms</a>
            and
            <a href="/privacy" class="dv-accent-text hover:underline">Privacy Policy</a>
        </p>
    </div>
</div>
{% endblock %}
