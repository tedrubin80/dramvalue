# Production overrides for docker-compose.yml
services:
  api:
    build:
      context: .
      target: production
    volumes: []  # No source mounting in production
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: .
      target: production
    volumes: []
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2 -Q scraping,maintenance,celery
    restart: always
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1G

  beat:
    build:
      context: .
      target: production
    volumes: []
    command: celery -A src.tasks.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    restart: always
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M

  db:
    ports: !reset []
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  tor:
    ports: !reset []
    restart: always
